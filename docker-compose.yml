name: mindbase

services:
  # PostgreSQL 17 + pgvector
  postgres:
    image: pgvector/pgvector:pg17
    container_name: mindbase-postgres-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mindbase}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mindbase_dev}
      POSTGRES_DB: ${POSTGRES_DB:-mindbase_dev}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-15434}:${POSTGRES_INTERNAL_PORT:-5432}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindbase"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # FastAPI Backend - REST API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mindbase-api-dev
    ports:
      - "${API_PORT:-18003}:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-mindbase}:${POSTGRES_PASSWORD:-mindbase_dev}@postgres:${POSTGRES_INTERNAL_PORT:-5432}/${POSTGRES_DB:-mindbase_dev}}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-large}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-qwen3-embedding:8b}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS:-3072}
      - DEBUG=${DEBUG:-true}
      - PYTHONPATH=/app/app:/workspace/mindbase
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api:/app/app:rw
      - .:/workspace/mindbase:ro  # Read-only access to entire repository for tooling
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Ollama - Embedding Service (Docker版、非Apple Silicon用)
  # Apple Silicon: brew install ollama (Metal GPU高速化)
  # その他: Docker Compose (CPU のみ)
  ollama:
    image: ollama/ollama:latest
    container_name: mindbase-ollama-dev
    profiles:
      - ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data_dev:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # CLI - Content generation and publishing
  cli:
    build:
      context: .
      dockerfile: apps/cli/Dockerfile
    container_name: mindbase-cli
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-mindbase}:${POSTGRES_PASSWORD:-mindbase_dev}@postgres:${POSTGRES_INTERNAL_PORT:-5432}/${POSTGRES_DB:-mindbase_dev}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-qwen3-embedding:8b}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-large}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - NOTE_EMAIL=${NOTE_EMAIL:-}
      - NOTE_PASSWORD=${NOTE_PASSWORD:-}
      - QIITA_TOKEN=${QIITA_TOKEN:-}
      - ZENN_REPO_PATH=${ZENN_REPO_PATH:-}
      - MINDBASE_API_URL=http://api:8000
    volumes:
      - .:/app
      - node_modules_cli:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - cli

volumes:
  postgres_data_dev:  # 開発データ (削除可能)
    driver: local
  ollama_data_dev:  # 開発データ (削除可能)
    driver: local
  node_modules_cli:  # CLI依存 (隔離)
    driver: local
