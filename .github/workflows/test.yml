name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: mindbase
          POSTGRES_PASSWORD: mindbase_dev
          POSTGRES_DB: mindbase_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Python dependencies (uv workspace)
        run: uv sync --all-packages

      - name: Install TypeScript dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run Python tests
        env:
          DATABASE_URL: postgresql+asyncpg://mindbase:mindbase_dev@localhost:5432/mindbase_test
          OLLAMA_URL: http://localhost:11434
        run: uv run pytest tests/ -v

      - name: Run TypeScript type check
        run: pnpm --filter @mindbase/mcp-server typecheck

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies (uv workspace)
        run: uv sync --all-packages

      - name: Run Black
        run: uv run black --check apps/api/ libs/collectors/

      - name: Run Ruff
        run: uv run ruff check apps/api/ libs/collectors/

      - name: Run mypy
        continue-on-error: true  # TODO: Fix mypy configuration
        run: uv run mypy apps/api/ libs/collectors/
